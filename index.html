<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#1a3a2a">
    <title>Majlis Aqiqah — Akid Mozaffa</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Nunito:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --forest: #1a3a2a;
            --forest-mid: #2a5a40;
            --sage: #4a7c5f;
            --sage-light: #7aad8f;
            --cream: #f8f4ec;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --ivory: #fdfaf4;
            --text-dark: #1a2418;
            --text-mid: #3d5440;
            --text-light: #7a9a7e;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--forest);
            font-family: 'Nunito', sans-serif;
            font-weight: 300;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Language Toggle UI (Liquid Glass) ── */
        .lang-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            background: rgba(10, 25, 18, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 4px;
            border-radius: 100px;
            display: flex;
            gap: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .lang-btn {
            padding: 6px 14px;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: rgba(248, 244, 236, 0.6);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.05em;
        }

        .lang-btn.active {
            background: var(--gold);
            color: var(--forest);
        }

        /* ── Hero ── */
        .hero {
            min-height: 100svh;
            background: var(--forest);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(74, 124, 95, 0.35) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 20% 100%, rgba(42, 90, 64, 0.4) 0%, transparent 60%);
            pointer-events: none;
        }

        .bismillah {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.1rem, 5vw, 1.4rem);
            color: var(--gold-light);
            letter-spacing: 0.08em;
            margin-bottom: 2rem;
            text-align: center;
            opacity: 0;
            animation: fadeUp 1s ease 0.2s forwards;
        }

        .ornament {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 2rem;
            opacity: 0;
            animation: fadeUp 1s ease 0.4s forwards;
        }

        .hero-tag {
            font-size: 0.72rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--sage-light);
            margin-bottom: 1.2rem;
            opacity: 0;
            animation: fadeUp 1s ease 0.6s forwards;
        }

        .baby-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 15vw, 4.5rem);
            font-weight: 300;
            font-style: italic;
            color: var(--cream);
            line-height: 1.05;
            text-align: center;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeUp 1s ease 0.8s forwards;
        }

        .baby-name span {
            display: block;
            font-size: clamp(0.85rem, 4vw, 1rem);
            font-family: 'Nunito', sans-serif;
            font-style: normal;
            letter-spacing: 0.2em;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .hero-date {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 4.5vw, 1.25rem);
            color: var(--sage-light);
            margin-top: 1.5rem;
            letter-spacing: 0.06em;
            opacity: 0;
            animation: fadeUp 1s ease 1s forwards;
        }

        .scroll-cue {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--sage-light);
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1.5s ease 1.8s forwards;
        }

        .scroll-cue::after {
            content: '';
            width: 1px;
            height: 32px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            animation: scrollLine 2s ease-in-out infinite;
        }

        @keyframes scrollLine {

            0%,
            100% {
                opacity: 0.3;
                transform: scaleY(1);
            }

            50% {
                opacity: 1;
                transform: scaleY(1.1);
            }
        }

        /* ── Sections ── */
        .section {
            background: var(--ivory);
            padding: 3.5rem 1.75rem;
            position: relative;
        }

        .section.alt {
            background: var(--cream);
        }

        .section.dark {
            background: var(--forest);
            color: var(--cream);
        }

        .section-tag {
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--gold);
            text-align: center;
            margin-bottom: 0.6rem;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.6rem, 7vw, 2.2rem);
            font-weight: 300;
            text-align: center;
            color: var(--forest);
            margin-bottom: 2rem;
            line-height: 1.2;
        }

        .dark .section-title {
            color: var(--cream);
        }

        .divider {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 0 auto 2.5rem;
            opacity: 0.6;
        }

        /* ── Event Card ── */
        .event-card {
            background: var(--ivory);
            border: 1px solid rgba(201, 168, 76, 0.25);
            border-radius: 16px;
            padding: 2rem 1.5rem;
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }

        .event-day {
            font-size: 0.68rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .event-date-big {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 12vw, 3.5rem);
            font-weight: 300;
            color: var(--forest);
            line-height: 1;
        }

        .event-month-year {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            color: var(--sage);
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
        }

        .event-rule {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.4), transparent);
            margin: 1.5rem 0;
        }

        .event-info-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            text-align: left;
            margin-bottom: 1rem;
        }

        .event-icon {
            width: 32px;
            height: 32px;
            background: rgba(201, 168, 76, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .event-icon svg {
            width: 16px;
            height: 16px;
            stroke: var(--gold);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .event-info-label {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 2px;
        }

        .event-info-val {
            font-size: 0.9rem;
            color: var(--text-dark);
            line-height: 1.5;
            font-weight: 400;
        }

        /* ── Map buttons ── */
        .map-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1.75rem;
        }

        .map-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 0.5rem;
            border-radius: 10px;
            font-size: 0.8rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-decoration: none;
            transition: transform 0.15s, opacity 0.15s;
            cursor: pointer;
        }

        .map-btn:active {
            transform: scale(0.97);
            opacity: 0.85;
        }

        .map-btn.waze {
            background: #33CCFF;
            color: #1a1a2e;
        }

        .map-btn.gmap {
            background: #4285F4;
            color: #fff;
        }

        .map-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ── RSVP ── */
        .rsvp-wrap {
            max-width: 400px;
            margin: 0 auto;
        }

        .rsvp-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border: 1px solid rgba(201, 168, 76, 0.35);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .rsvp-toggle-btn {
            padding: 0.75rem;
            font-family: 'Nunito', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }

        .rsvp-toggle-btn.active-hadir {
            background: var(--forest);
            color: var(--cream);
        }

        .rsvp-toggle-btn.active-tidak {
            background: #7a4a3a;
            color: #fef0e8;
        }

        .rsvp-toggle-btn.inactive {
            background: transparent;
            color: var(--text-mid);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 0.4rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(74, 124, 95, 0.3);
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.8);
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--gold);
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            margin-top: 0.5rem;
        }

        .submit-btn.hadir-btn {
            background: var(--forest);
            color: var(--cream);
        }

        .submit-btn.tidak-btn {
            background: #7a4a3a;
            color: #fef0e8;
        }

        .success-msg {
            text-align: center;
            padding: 2rem 1rem;
            display: none;
        }

        .success-msg .check-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(74, 124, 95, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .success-msg p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: var(--forest);
            line-height: 1.5;
        }

        /* ── Doa ── */
        .doa-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 4.5vw, 1.15rem);
            font-style: italic;
            line-height: 1.9;
            text-align: center;
            color: var(--cream);
            max-width: 340px;
            margin: 0 auto;
            opacity: 0.92;
        }

        /* ── Contact ── */
        .contact-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: var(--ivory);
            border-radius: 12px;
            margin-bottom: 0.75rem;
            border: 1px solid rgba(74, 124, 95, 0.15);
            text-decoration: none;
            transition: transform 0.15s;
        }

        .contact-row:active {
            transform: scale(0.98);
        }

        .contact-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--sage), var(--forest));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cream);
            font-size: 0.8rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-dark);
            margin-bottom: 1px;
        }

        .contact-role {
            font-size: 0.72rem;
            color: var(--text-light);
            letter-spacing: 0.05em;
        }

        .contact-arrow {
            color: var(--gold);
            font-size: 1.1rem;
        }

        /* ── Footer ── */
        footer {
            background: var(--forest);
            padding: 2.5rem 1.5rem;
            text-align: center;
        }

        .footer-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 8vw, 2rem);
            font-weight: 300;
            font-style: italic;
            color: var(--cream);
            margin-bottom: 0.5rem;
        }

        .footer-sub {
            font-size: 0.72rem;
            color: var(--sage-light);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: none;
        }

        .notif {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--forest);
            color: var(--cream);
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s cubic-bezier(.34, 1.56, .64, 1);
            z-index: 999;
            white-space: nowrap;
            border: 1px solid rgba(201, 168, 76, 0.4);
        }

        .notif.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

    <script>
        function switchLang(lang) {
            document.documentElement.lang = lang;
            document.getElementById('lang-bm').classList.toggle('active', lang === 'bm');
            document.getElementById('lang-en').classList.toggle('active', lang === 'en');
            document.querySelectorAll('.i18n').forEach(el => { el.innerHTML = el.getAttribute(`data-${lang}`); });
            document.querySelectorAll('.i18n-attr').forEach(el => {
                const attrName = el.getAttribute('data-key');
                el.setAttribute(attrName, el.getAttribute(`data-${lang}`));
            });
            localStorage.setItem('preferred_lang', lang);
        }
        const savedLang = localStorage.getItem('preferred_lang') || 'bm';
        switchLang(savedLang);

        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

        let rsvpType = 'hadir';
        function setRsvp(type) {
            rsvpType = type;
            document.getElementById('btnHadir').className = (type === 'hadir') ? 'rsvp-toggle-btn active-hadir' : 'rsvp-toggle-btn inactive';
            document.getElementById('btnTidak').className = (type === 'tidak') ? 'rsvp-toggle-btn active-tidak' : 'rsvp-toggle-btn inactive';
            document.getElementById('hadirForm').style.display = (type === 'hadir') ? '' : 'none';
            document.getElementById('tidakForm').style.display = (type === 'tidak') ? '' : 'none';
        }

        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw9PTfuSkiJA5LlxhLffkRCbY7KGV6zJuibW000vMoCwc4ul3z5rY_PYk5KdpIkt2yF/exec';
        async function submitRsvp(type) {
            const btn = document.querySelector(type === 'hadir' ? '.hadir-btn' : '.tidak-btn');
            const nama = document.getElementById(type === 'hadir' ? 'hadirNama' : 'tidakNama').value.trim();
            if (!nama) { showNotif(document.documentElement.lang === 'bm' ? 'Sila masukkan nama anda.' : 'Please enter your name.'); return; }
            const oldText = btn.innerHTML;
            btn.innerHTML = '...';
            btn.disabled = true;
            const payload = { status: (type === 'hadir' ? 'Hadir' : 'Tidak Hadir'), nama: nama, masa: new Date().toLocaleString('ms-MY') };
            if (type === 'hadir') {
                payload.tel = document.getElementById('hadirTel').value;
                payload.jumlah = document.getElementById('hadirJumlah').value;
            } else {
                payload.pesan = document.getElementById('tidakPesan').value;
            }
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                document.getElementById('rsvpWrap').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            } catch {
                btn.innerHTML = oldText;
                btn.disabled = false;
                showNotif('Error. Please try again.');
            }
        }
        function showNotif(msg) {
            const n = document.getElementById('notif');
            n.textContent = msg; n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        function addToCal(type) {
            const event = {
                title: 'Majlis Aqiqah Akid Mozaffa',
                start: '20260530T030000Z', // 11:00 AM MYT is 03:00 AM UTC
                end: '20260530T080000Z',   // 4:00 PM MYT is 08:00 AM UTC
                address: 'Residensi Cendana, 24, Jalan Kesuma 8/2C, Bandar Tasik Kesuma, 43700, Beranang, Selangor',
                description: 'Majlis Aqiqah Akid Mozaffa bin Mohd Affandy'
            };

            if (type === 'google') {
                const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(event.title)}&dates=${event.start}/${event.end}&details=${encodeURIComponent(event.description)}&location=${encodeURIComponent(event.address)}`;
                window.open(url, '_blank');
            } else if (type === 'apple') {
                const icsData = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${event.start}\nDTEND:${event.end}\nSUMMARY:${event.title}\nDESCRIPTION:${event.description}\nLOCATION:${event.address}\nEND:VEVENT\nEND:VCALENDAR`;
                const blob = new Blob([icsData], { type: 'text/calendar;charset=utf-8' });
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.setAttribute('download', 'Majlis_Aqiqah_Akid.ics');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
